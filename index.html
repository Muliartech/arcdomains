<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Domains - Web3 Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js" type="text/javascript"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="p-5 flex justify-between items-center border-b border-slate-800">
        <h1 class="text-xl font-bold text-sky-400">🌀 Arc Domains</h1>
        <button id="connectBtn" class="bg-sky-500 hover:bg-sky-600 px-4 py-2 rounded-xl text-sm font-semibold transition">
            Connect Wallet
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 w-full flex-grow flex flex-col justify-center">
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-xl font-bold mb-1 text-center">Claim your .arc Name</h2>
            <p id="walletAddress" class="text-center text-xs text-slate-400 mb-6 truncate">Wallet not connected</p>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-semibold">Register Name</label>
                <div class="flex">
                    <input id="domainInput" type="text" placeholder="yourname" class="bg-slate-900 border border-slate-700 rounded-l-xl px-4 py-2.5 w-full focus:outline-none focus:border-sky-500 text-white">
                    <span class="bg-slate-700 text-slate-300 px-4 flex items-center rounded-r-xl font-bold">.arc</span>
                </div>
                <button id="registerBtn" class="w-full mt-3 bg-emerald-500 hover:bg-emerald-600 py-3 rounded-xl font-bold transition">
                    Register Domain
                </button>
            </div>

            <hr class="border-slate-700 my-5">

            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-400 mb-2 font-semibold">Search Registry</label>
                <div class="flex">
                    <input id="lookupInput" type="text" placeholder="searchname" class="bg-slate-900 border border-slate-700 rounded-l-xl px-4 py-2.5 w-full focus:outline-none focus:border-sky-500 text-white">
                    <span class="bg-slate-700 text-slate-300 px-4 flex items-center rounded-r-xl font-bold">.arc</span>
                </div>
                <button id="lookupBtn" class="w-full mt-3 bg-indigo-500 hover:bg-indigo-600 py-3 rounded-xl font-bold transition">
                    Check Availability / Owner
                </button>
                <p id="lookupResult" class="mt-4 text-center text-sm font-medium break-all"></p>
            </div>
        </div>
    </main>

    <footer class="p-4 text-center text-xs text-slate-600 border-t border-slate-800">
        Deployed on Arc Testnet via Mobile
    </footer>

    <script>
        // CRITICAL STEP: Swap this out with your copied Smart Contract Address from Remix
        const CONTRACT_ADDRESS = "YOUR_DEPLOYED_CONTRACT_ADDRESS_HERE";

        // Human-Readable ABI mapping the contract functions
        const CONTRACT_ABI = [
            "function registerDomain(string memory _name) public",
            "function getOwner(string memory _name) public view returns (address)"
        ];

        let provider, signer, contract;

        const connectBtn = document.getElementById('connectBtn');
        const walletAddressTxt = document.getElementById('walletAddress');
        const domainInput = document.getElementById('domainInput');
        const registerBtn = document.getElementById('registerBtn');
        const lookupInput = document.getElementById('lookupInput');
        const lookupBtn = document.getElementById('lookupBtn');
        const lookupResult = document.getElementById('lookupResult');

        async function init() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                window.ethereum.on('accountsChanged', () => { location.reload(); });
                window.ethereum.on('chainChanged', () => { location.reload(); });
            }
        }

        async function connectWallet() {
            if (!provider) return alert("Open this link inside the MetaMask App Browser!");
            try {
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                walletAddressTxt.innerText = `Wallet: ${address}`;
                connectBtn.innerText = "Connected App";
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
            } catch (err) {
                alert("Connection failed.");
            }
        }

        async function registerDomain() {
            if (!contract) return alert("Connect wallet first!");
            const name = domainInput.value.trim().toLowerCase();
            if (!name) return alert("Type a valid domain string!");

            try {
                registerBtn.innerText = "Check Wallet Prompt...";
                const tx = await contract.registerDomain(name);
                await tx.wait();
                alert(`Success! "${name}.arc" is yours.`);
                registerBtn.innerText = "Register Domain";
                domainInput.value = "";
            } catch (err) {
                alert("Transaction failed. Name might be taken or you lack gas.");
                registerBtn.innerText = "Register Domain";
            }
        }

        async function lookupDomain() {
            if (!provider) return alert("Web3 provider uninitialized.");
            const name = lookupInput.value.trim().toLowerCase();
            if (!name) return alert("Enter a name!");

            const activeContract = contract || new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);

            try {
                const owner = await activeContract.getOwner(name);
                if (owner === "0x0000000000000000000000000000000000000000") {
                    lookupResult.innerText = `🎉 "${name}.arc" is available!`;
                    lookupResult.className = "mt-4 text-center text-sm font-medium text-green-400";
                } else {
                    lookupResult.innerText = `Owned by: ${owner}`;
                    lookupResult.className = "mt-4 text-center text-sm font-medium text-amber-400 break-all";
                }
            } catch (err) {
                alert("Lookup failed.");
            }
        }

        connectBtn.addEventListener('click', connectWallet);
        registerBtn.addEventListener('click', registerDomain);
        lookupBtn.addEventListener('click', lookupDomain);
        window.addEventListener('load', init);
    </script>
</body>
</html>
