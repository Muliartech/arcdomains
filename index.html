<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arc.domains | Web3 Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="bg-[#FAFAFA] text-neutral-900 font-sans min-h-screen flex flex-col items-center selection:bg-black selection:text-white">

    <nav class="w-full max-w-5xl flex justify-between items-center p-6">
        <div class="font-bold text-2xl tracking-tighter">arc.domains</div>
        <button id="connectBtn" class="bg-black text-white px-5 py-2 rounded-xl font-medium shadow-sm hover:bg-neutral-800 transition">
            Connect Wallet
        </button>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center w-full px-6 text-center -mt-10">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-6">
            Own your identity on <br />
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-violet-600">Arc Network</span>
        </h1>
        <p class="text-lg text-neutral-500 mb-10 max-w-md mx-auto">
            Register your web3 domain for 10 USDC. Minimalist, fast, and fully decentralized.
        </p>

        <div class="w-full max-w-lg bg-white p-2 rounded-2xl shadow-sm border border-neutral-200 flex items-center transition-all focus-within:border-black focus-within:ring-1 focus-within:ring-black">
            <input id="domainInput" type="text" placeholder="e.g. alice.arc" class="flex-1 outline-none px-4 py-2 text-lg bg-transparent placeholder-neutral-400">
            <button id="registerBtn" class="bg-black text-white px-6 py-3 rounded-xl font-medium hover:bg-neutral-800 transition disabled:opacity-50">
                Register
            </button>
        </div>
        
        <p id="statusMsg" class="mt-6 text-sm font-medium text-neutral-600 h-6"></p>
    </main>

    <script>
        // --- ARC TESTNET CONFIGURATION --- //
        const ARC_RPC = "https://rpc.testnet.arc.network";
        const CHAIN_ID = 5042002; 
        const CONTRACT_ADDRESS = "0x036d43dc4b52bf581EbD3527444cF845C00119e4"; // Your deployed contract
        const USDC_ADDRESS = "0x3600000000000000000000000000000000000000"; // Arc Testnet USDC

        // Minimal ABIs to execute the transactions
        const usdcABI = ["function approve(address spender, uint256 amount) public returns (bool)"];
        const domainABI = ["function registerDomain(string memory domain) public"];

        let provider, signer;

        const connectBtn = document.getElementById('connectBtn');
        const registerBtn = document.getElementById('registerBtn');
        const domainInput = document.getElementById('domainInput');
        const statusMsg = document.getElementById('statusMsg');

        // Helper function for status messages
        const setStatus = (msg, isError = false) => {
            statusMsg.textContent = msg;
            statusMsg.style.color = isError ? "#ef4444" : "#525252"; // Red for errors, neutral for normal
        };

        // 1. Connect Wallet & Switch to Arc Testnet
        connectBtn.addEventListener('click', async () => {
            if (!window.ethereum) return setStatus("Please install a Web3 wallet like MetaMask.", true);
            
            try {
                setStatus("Connecting...");
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                
                // Update Button UI
                connectBtn.textContent = address.slice(0,6) + "..." + address.slice(-4);
                connectBtn.classList.replace('bg-black', 'bg-neutral-100');
                connectBtn.classList.replace('text-white', 'text-black');
                
                // Force network switch to Arc Testnet
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: ethers.toBeHex(CHAIN_ID) }],
                    });
                } catch (switchError) {
                    // This error code indicates that the chain has not been added to MetaMask
                    if (switchError.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: ethers.toBeHex(CHAIN_ID),
                                chainName: 'Arc Testnet',
                                rpcUrls: [ARC_RPC],
                                nativeCurrency: { name: 'ARC', symbol: 'ARC', decimals: 18 },
                                blockExplorerUrls: ['https://explorer.testnet.arc.network']
                            }]
                        });
                    } else {
                        throw switchError;
                    }
                }
                setStatus("Wallet connected to Arc Testnet.");
            } catch (err) {
                setStatus("Connection failed: " + err.message, true);
            }
        });

        // 2. Register Domain Flow (Approve USDC -> Register)
        registerBtn.addEventListener('click', async () => {
            if (!signer) return setStatus("Please connect your wallet first.", true);
            
            let domain = domainInput.value.trim().toLowerCase();
            if (!domain) return setStatus("Please enter a domain name.", true);
            
            // Auto-append .arc if user forgot it
            if (!domain.endsWith('.arc')) {
                domain += '.arc';
                domainInput.value = domain;
            }

            try {
                registerBtn.disabled = true;
                const usdcContract = new ethers.Contract(USDC_ADDRESS, usdcABI, signer);
                const domainContract = new ethers.Contract(CONTRACT_ADDRESS, domainABI, signer);
                
                // 10 USDC (USDC uses 6 decimals)
                const price = ethers.parseUnits("10", 6); 

                // Step A: Approve USDC
                setStatus("Step 1/2: Please approve 10 USDC in your wallet...");
                const tx1 = await usdcContract.approve(CONTRACT_ADDRESS, price);
                setStatus("Step 1/2: Waiting for approval transaction to confirm...");
                await tx1.wait();

                // Step B: Register Domain
                setStatus("Step 2/2: Please confirm the domain registration...");
                const tx2 = await domainContract.registerDomain(domain);
                setStatus("Step 2/2: Registering your domain on-chain...");
                await tx2.wait();

                setStatus(`🎉 Success! You are now the proud owner of ${domain}.`);
                domainInput.value = ''; // Clear input on success
            } catch (err) {
                console.error(err);
                setStatus("Transaction failed: " + (err.reason || "User rejected or network error."), true);
            } finally {
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
